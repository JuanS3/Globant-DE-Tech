services:
  db:
    image: postgres:16-alpine
    container_name: globant-de-tech-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: globant_de
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d globant_de"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: on-failure

  app:
    build: .
    container_name: globant-de-tech-app
    ports:
      - "8000:8000"
    environment:
      DB_DRIVER: postgresql
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: globant_de
    depends_on:
      - db
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    restart: on-failure

volumes:
  pgdata:
